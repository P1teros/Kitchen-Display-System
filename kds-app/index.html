<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Alata&family=Radio+Canada:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Alata&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Radio+Canada:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

    <style>

        /* rozjasnienie po najechaniu na pozycje lub naglowek */
        p:hover 
        {
            filter: brightness(1.3);
            transition: filter 0.3s;
        }

        .naglowek:hover 
        {
            filter: brightness(1.2);
            transition: filter 0.3s;
        }

        /* nowa karta wjezdza z lewej strony */
        @keyframes slide-in 
        {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* karta wyjezdza w prawa strone po skonczonym zamowieniu */
        @keyframes fade-out 
        {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-20px); }
        }
        
        body 
        {
            background: #111;  
            color: #fff;
            font-family: 'Alata', sans-serif;
            padding: 20px;
            overflow: hidden; /* blokuje przewijanie strony */
        }

        /* kontener na karty - uklada je w rzedzie */
        #orders 
        {
            display: flex;
            flex-wrap: wrap; /* przechodzi do nowej linii gdy brak miejsca */
            gap: 20px;      
            height: calc(100vh - 100px);  
            overflow: hidden;
        }

        /* kazda karta zamowienia */
        #orders div 
        {
            min-width: 200px;
            max-width: 300px;
            flex: 1; /* karty wypelniaja rowno dostepne miejsce */
        }

        h2 
        {
            font-size: 1.1rem;  
            background: none;  
            border-radius: 4px;    
            padding: 6px 12px;  
            margin: 4px 0;         
        }

        /* styl dla kazdej pozycji w zamowieniu */
        p 
        {
            font-size: 1.3rem;  
            background: #476c94;   
            border-radius: 8px;   
            padding: 6px 12px; 
            margin: 4px 0;
        }

        /* wiersz ze stolikiem - ciemniejszy niz pozycje */
        .stol
        {
            background: #112d43;
            font-size: 1rem;       
        }

        /* karta zamowienia */
        .karta 
        {
            background: #222;
            border: 2px solid #007afc;
            border-radius: 16px;
            overflow: hidden; /* naglowek nie wychodzi poza zaokraglone rogi */   
            padding: 0; 
            animation: slide-in 0.1s ease;
        }

        /* klasa dodawana gdy zamowienie ma zniknac - odpala animacje */
        .znika
        {
            animation: fade-out 0.6s ease forwards; /*forwards = zostan w stanie koncowym po animacji */
        }

        .naglowek 
        {
            background: #007afc;   
            padding: 10px 16px;
        }

        .tresc
        {
            padding: 12px 16px;   
        }

        /* pozycje nalezace do zestawu - wciete pod rodzica */
        .modyfikator 
        {
            margin-left: 20px;
            font-size: 1rem;
            background: #2d4a6e;
        }

        /* godzina zlozenia zamowienia */
        .godzina 
        {
            background: none;
            font-size: 0.9rem;
            color: #f5d8d8;
            padding: 2px 0;
            text-align: center;
        }

        /* timer odliczajacy czas od zlozenia zamowienia */
        .timer 
        {
            font-size: 0.9rem;
            color: #fff;
            background: #192028;
            border-radius: 6px;
            padding: 4px 8px;
        }

    </style>
</head>
<body>

    <div style="display:flex; align-items:center; margin-bottom:20px;">
        <h1 style="margin:0; margin-right:20px;">Kitchen Display</h1>
        <button onclick="pokazPodsumowanie()" style="padding:14px 40px; background:#ff8c00; color:#fff; border:none; border-radius:40px; font-size:1.2rem; cursor:pointer; font-family:'Kanit', sans-serif; margin-left:120px;">
            PODSUMOWANIE
        </button>
    </div>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#222; border:2px solid #007afc; border-radius:16px; padding:30px; width:95vw; max-height:85vh; overflow-y:auto;">
            <h2 style="margin:0 0 20px;">DO ZROBIENIA (ILOŚĆ PRODUKTÓW)</h2>
            <div id="modal-tresc" style="display:grid; grid-template-columns: repeat(6, 1fr); gap:5px; max-height:70vh; overflow-y:auto;"></div>
            <button onclick="document.getElementById('modal').style.display='none'" style="margin-top:10px; padding:20px 100px; background:#e54343; color:#fff; border:none; border-radius:5px; cursor:pointer; font-size:1rem; font-family:'Kanit', sans-serif;">
                ZAMKNIJ
            </button>
        </div>
    </div>

    <div id="orders">Ładowanie..</div>
    <script>

        let grouped = {};

        /* 
         - pobiera zamowienia z serwera i aktualizuje karty na ekranie
         - nowe karty sa dodawane a stare usuwane bez "migania' calej strony
         */
        async function loadOrders() 
        {
            const container = document.getElementById('orders');
            
            if (container.innerHTML === 'Ładowanie..') 
                container.innerHTML = '';

            const response = await fetch('/api/orders');
            const data = await response.json();

            console.log(data[0]);

            /* grupowanie wierszy z bazy po id zamowienia*/
            grouped = {};
            data.forEach(row =>
            {   
                if (!grouped[row.id_pos_order]) 
                {
                    grouped[row.id_pos_order] = 
                    {
                        name: row.name,
                        created_at: row.created_at,
                        items: []
                    }
                }

                if (row.item_name) /*sprawdzanie czy wiersz ma nazwe pozycji (moze byc null jesli zamwienie jest puste)*/
                {
                    grouped[row.id_pos_order].items.push({
                        name: row.item_name,
                        parent: row.id_pos_order_line_parent, 
                        id: row.id_pos_order_line,
                        done: row.kds_served != null && row.kds_served !== '0000-00-00 00:00:00',
                        status: row.kds_status
                    });
                } 
            });

            /* usun karty zamowien ktorych juz nie ma w bazie */
            Array.from(container.children).forEach(karta => {
                if (!grouped[karta.dataset.id]) karta.remove();
            });

            /* dla kazdego zamowienia - stworz nowa karte lub zaktualizuj istniejaca */
            Object.entries(grouped).forEach(([id, order]) => {
                let div = container.querySelector(`[data-id="${id}"]`);
                
                if (!div) {
                    div = document.createElement('div');
                    div.className = 'karta';
                    div.dataset.id = id; /* id zamowienia w html uzywane do wyszukiwania karty */
                    container.appendChild(div);
                }

                const orderId = Number(id);

                /* aktualizuj zawartosc karty przy kazdym odswiezeniu
                 , pozycje moga znikac gdy kucharz je oznacza */
                div.innerHTML = `
                    <div class="naglowek" onclick="gotowe(${orderId})" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                        <h2>Zamówienie #${id}</h2>
                        <span class="timer" data-start="${new Date(order.created_at).getTime()}">00:00</span>
                        <button onclick="event.stopPropagation(); pokazMenu(${orderId}, this)" style="background:#444; color:#fff; border:none; border-radius:6px; padding:10px 30px; cursor:pointer; font-size:1.4rem;">⋯</button>
                    </div>
                    <p class="godzina">${new Date(order.created_at).toLocaleTimeString('pl-PL')}</p>
                    <div class="tresc">
                        <p class="stol">Stół: ${order.name}</p>
                        ${[...order.items.filter(i => !i.done), ...order.items.filter(i => i.done)].map(item => `
                            <p onclick="gotoweLinia(${item.id}, ${orderId})" 
                            style="cursor:pointer; ${item.done ? 'background:#444; color:#888;' : item.status == 1 ? 'background:#ff8c00;' : item.status == 2 ? 'background:#2d8a4e;' : 'background:#c0392b;'}">
                                ${item.name}
                            </p>`).join('')}
                    </div>
                `;
            });
        }

        /* oznacza cale zamowienie jako gotowe ,najpierw odpala animacje znikania potem wysyla request do serwera  */
        async function gotowe(id) 
        {
            const karta = document.querySelector(`[data-id="${id}"]`);

            if (karta)
            {
                karta.classList.add('znika'); /* odpala animacje fade-out */
                setTimeout(async() => {
                    await fetch(`/api/done/${id}`, { method: 'POST' });  
                    loadOrders();   
                }, 200);
            }
        }

        /*
           1. oznacza pojedyncza pozycje jako gotowa
         2. jesli to byla ostatnia pozycja - animuje znikniecie calej karty
         */
        async function gotoweLinia(id, orderId) 
        {
            await fetch(`/api/done/line/${id}`, { method: 'POST' }); 

            /*ile pozycji zostalo w zamowieniu */
            const remaining = document.querySelectorAll(`[data-id="${orderId}"] .tresc p:not(.stol)`);

            if (remaining.length <= 1)
            {
                /* ostatnia pozycja-animacja karty */
                const karta = document.querySelector(`[data-id="${orderId}"]`);
                
                if (karta) 
                {
                    karta.classList.add('znika');
                    setTimeout(() => loadOrders(), 600);
                    return;
                }
            }
                
            loadOrders();
        }

        function pokazPodsumowanie() 
        {
            const summed = {}; 

        // przechodzenie przez grouped i zsumowanie ilosci
            Object.entries(grouped).forEach(([id, order]) => {
                order.items.forEach(item => {

                    if (item.done)
                    {
                        return;    
                    }
                    
                    if (summed[item.name]) 
                    {
                        summed[item.name]++; 
                    }
                    else
                    {
                        summed[item.name] = 1;
                    }
                });
            });
            // pokazanie wyniku w okienku alert()
            let tekst = '';
            Object.entries(summed).forEach(([nazwa, ilosc]) => {
                tekst += nazwa + ': ' + ilosc + '\n'; 
            });

            const modal = document.getElementById('modal');
            const tresc = document.getElementById('modal-tresc');
            
            tresc.innerHTML = Object.entries(summed)
                .map(([nazwa, ilosc]) => `<p style="font-size:0.9rem; padding:10px 10px; margin:2px 0;">${nazwa}: ${ilosc}</p>`)
                .join('');
            modal.style.display = 'flex';
        }

        /* aktualizuje timery na wszystkich kartach co sekunde */
        setInterval(() => {
            document.querySelectorAll('.timer').forEach(timer => {
                const start = Number(timer.dataset.start); /* czas zlozenia zamowienia w milisek */
                const diff = Math.floor((Date.now() - start) / 1000); /* ile sekund minelo */
                const min = String(Math.floor(diff / 60)).padStart(2, '0'); /* minuty z wiodacym zerem */
                const sec = String(diff % 60).padStart(2, '0'); /* sekundy z wiodacym zerem */
                timer.textContent = `${min}:${sec}`;
            });
        }); 

        setInterval(loadOrders, 5000); /* odswieza zamowienia co 5 sekund */
        loadOrders(); 
    </script>

</body>
</html>
