<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Alata&family=Radio+Canada:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <style>

        /* rozjasnienie po najechaniu na pozycje lub naglowek */
        p:hover 
        {
            filter: brightness(1.3);
            transition: filter 0.3s;
        }

        .naglowek:hover 
        {
            filter: brightness(1.2);
            transition: filter 0.3s;
        }

        /* nowa karta wjezdza z lewej strony */
        @keyframes slide-in 
        {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* karta wyjezdza w prawa strone po skonczonym zamowieniu */
        @keyframes fade-out 
        {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(20px); }
        }
        
        body 
        {
            background: #111;  
            color: #fff;
            font-family: 'Alata', sans-serif;
            padding: 20px;
            overflow: hidden; /* blokuje przewijanie strony */
        }

        /* kontener na karty - uklada je w rzedzie */
        #orders 
        {
            display: flex;
            flex-wrap: wrap; /* przechodzi do nowej linii gdy brak miejsca */
            gap: 20px;      
            height: calc(100vh - 100px);  
            overflow: hidden;
        }

        /* kazda karta zamowienia */
        #orders div 
        {
            min-width: 200px;
            max-width: 300px;
            flex: 1; /* karty wypelniaja rowno dostepne miejsce */
        }

        h2 
        {
            font-size: 1.1rem;  
            background: #43505e;  
            border-radius: 8px;    
            padding: 6px 12px;  
            margin: 4px 0;         
        }

        /* styl dla kazdej pozycji w zamowieniu */
        p 
        {
            font-size: 1.3rem;  
            background: #476c94;   
            border-radius: 8px;   
            padding: 6px 12px; 
            margin: 4px 0;
        }

        /* wiersz ze stolikiem - ciemniejszy niz pozycje */
        .stol
        {
            background: #112d43;
            font-size: 1rem;       
        }

        /* karta zamowienia */
        .karta 
        {
            background: #222;
            border: 2px solid #007afc;
            border-radius: 16px;
            overflow: hidden; /* naglowek nie wychodzi poza zaokraglone rogi */   
            padding: 0; 
            animation: slide-in 0.3s ease;
        }

        /* klasa dodawana gdy zamowienie ma zniknac - odpala animacje */
        .znika
        {
            animation: fade-out 0.6s ease forwards; /*forwards = zostan w stanie koncowym po animacji */
        }

        .naglowek 
        {
            background: #007afc;   
            padding: 10px 16px;
        }

        .tresc
        {
            padding: 12px 16px;   
        }

        /* pozycje nalezace do zestawu - wciete pod rodzica */
        .modyfikator 
        {
            margin-left: 20px;
            font-size: 1rem;
            background: #2d4a6e;
        }

        /* godzina zlozenia zamowienia */
        .godzina 
        {
            background: none;
            font-size: 0.9rem;
            color: #f5d8d8;
            padding: 2px 0;
            text-align: center;
        }

        /* timer odliczajacy czas od zlozenia zamowienia */
        .timer 
        {
            font-size: 1rem;
            color: #fff;
            background: #192028;
            border-radius: 8px;
            padding: 4px 8px;
        }

    </style>
</head>
<body>

    <h1>Kitchen Display</h1>

    <div id="orders">Ładowanie..</div>

    <script>

        /* 
         - pobiera zamowienia z serwera i aktualizuje karty na ekranie
         - nowe karty sa dodawane a stare usuwane bez "migania' calej strony
         */
        async function loadOrders() 
        {
            const container = document.getElementById('orders');
            
            if (container.innerHTML === 'Ładowanie..') 
                container.innerHTML = '';

            const response = await fetch('/api/orders');
            const data = await response.json();

            /* grupowanie wierszy z bazy po id zamowienia*/
            const grouped = {};
            data.forEach(row =>
            {   
                if (!grouped[row.id_pos_order]) 
                {
                    grouped[row.id_pos_order] = 
                    {
                        name: row.name,
                        created_at: row.created_at,
                        items: []
                    }
                }

                if (row.item_name) 
                {
                    grouped[row.id_pos_order].items.push({
                        name: row.item_name,
                        parent: row.id_pos_order_line_parent, /* null = glowne danie, liczba = modyfikator zestawu */
                        id: row.id_pos_order_line
                    });
                } 
            });

            /* usun karty zamowien ktorych juz nie ma w bazie */
            Array.from(container.children).forEach(karta => {
                if (!grouped[karta.dataset.id]) karta.remove();
            });

            /* dla kazdego zamowienia - stworz nowa karte lub zaktualizuj istniejaca */
            Object.entries(grouped).forEach(([id, order]) => {
                let div = container.querySelector(`[data-id="${id}"]`);
                
                if (!div) {
                    div = document.createElement('div');
                    div.className = 'karta';
                    div.dataset.id = id; /* id zamowienia w html uzywane do wyszukiwania karty */
                    container.appendChild(div);
                }

                const orderId = Number(id);

                /* aktualizuj zawartosc karty przy kazdym odswiezeniu
                 * pozycje moga znikac gdy kucharz je oznacza
                 */
                div.innerHTML = `
                    <div class="naglowek" onclick="gotowe(${orderId})" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                        <h2>Zamówienie #${id}</h2>
                        <span class="timer" data-start="${new Date(order.created_at).getTime()}">00:00</span>
                    </div>
                    <p class="godzina">${new Date(order.created_at).toLocaleTimeString('pl-PL')}</p>
                    <div class="tresc">
                        <p class="stol">Stół: ${order.name}</p>
                        ${order.items.map(item => `<p onclick="gotoweLinia(${item.id}, ${orderId})" style="cursor:pointer;">${item.name}</p>`).join('')}
                    </div>
                `;
            });
        }

        /*
         * oznacza cale zamowienie jako gotowe
         * najpierw odpala animacje znikania potem wysyla request do serwera
         */
        async function gotowe(id) 
        {
            const karta = document.querySelector(`[data-id="${id}"]`);

            if (karta)
            {
                karta.classList.add('znika'); /* odpala animacje fade-out */
                setTimeout(async() => {
                    await fetch(`/api/done/${id}`, { method: 'POST' });  
                    loadOrders();   
                }, 600); /* czeka az animacja sie skonczy (0.6s) */
            }
        }

        /*
         * oznacza pojedyncza pozycje jako gotowa
         * jesli to byla ostatnia pozycja - animuje znikniecie calej karty
         */
        async function gotoweLinia(id, orderId) 
        {
            await fetch(`/api/done/line/${id}`, { method: 'POST' }); 

            /* sprawdz ile pozycji zostalo w zamowieniu (pomijamy wiersz stol) */
            const remaining = document.querySelectorAll(`[data-id="${orderId}"] .tresc p:not(.stol)`);

            if (remaining.length <= 1)
            {
                /* ostatnia pozycja - animuj znikniecie calej karty */
                const karta = document.querySelector(`[data-id="${orderId}"]`);
                
                if (karta) 
                {
                    karta.classList.add('znika');
                    setTimeout(() => loadOrders(), 600);
                    return;
                }
            }
                
            loadOrders();
        }

        /* aktualizuje timery na wszystkich kartach co sekunde */
        setInterval(() => {
            document.querySelectorAll('.timer').forEach(timer => {
                const start = Number(timer.dataset.start); /* czas zlozenia zamowienia w ms */
                const diff = Math.floor((Date.now() - start) / 1000); /* ile sekund minelo */
                const min = String(Math.floor(diff / 60)).padStart(2, '0'); /* minuty z wiodacym zerem */
                const sec = String(diff % 60).padStart(2, '0'); /* sekundy z wiodacym zerem */
                timer.textContent = `${min}:${sec}`;
            });
        }); /* 1000ms = 1 sekunda */

        setInterval(loadOrders, 5000); /* odswiezaj zamowienia co 5 sekund */
        loadOrders(); /* zaladuj od razu przy starcie strony */
    </script>

</body>
</html>
