<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Alata&family=Radio+Canada:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <style>

        /*animacje - najezdzania na przycisk i pojawiania sie nowego zamowienia*/
        p:hover 
        {
            filter: brightness(1.3);
            transition: filter 0.3s;
        }

        .naglowek:hover 
        {
            filter: brightness(1.2);
            transition: filter 0.3s;
        }

        @keyframes slide-in 
        {
            from 
            {
                opacity: 0;
                transform: translateX(-20px);
            }

            to 
            {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fade-out 
        {
            from
            {
                opacity: 1;
                transform: translateX(0);
            }    

            to
            {
                opacity: 0;
                transform: translateX(20px);
            }   
        }
        

        /*body calosci*/
        body 
        {
            background: #111;  
            color: #fff;
            font-family: 'Alata', sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        /*zamowienia*/
        #orders 
        {
            display: flex;      /* ustawianie elementow w rzedzie i przechodzenie do nowej lini */
            flex-wrap: wrap; 
            gap: 20px;      
            height: calc(100vh - 100px);  /* cały ekran minus nagłówek */    
            overflow: hidden;
        }

        #orders div 
        {
            min-width: 200px;
            max-width: 300px;
            flex: 1;  /* wypelnianie rowno dostepnych miejsc */
        }

        h2 /* styl dla zamowienia */ 
        {
            font-size: 1.1rem;  
            background: #43505e;  
            border-radius: 8px;    
            padding: 6px 12px;  
            margin: 4px 0;         
        }

        p  /* styl dla pozycji */
        {
            font-size: 1.3rem;  
            background: #476c94;   
            border-radius: 8px;   
            padding: 6px 12px; 
            margin: 4px 0;         /* odstep miedzy pozycjami */
        }

        .stol
        {
            background: #112d43;
            font-size: 1rem;       
        }

        .zamowienie
        {
            background-color: rgb(96, 96, 167); 
            font-size: 1rem;            
        }

        .karta 
        {
            background: #222;
            border: 2px solid #007afc;
            border-radius: 16px;
            overflow: hidden;    
            padding: 0; 
            animation: slide-in 0.3s ease; 
        }

        .znika
        {
            animation: fade-out 0.6s ease forwards;
        }

        .naglowek 
        {
            background: #007afc;   
            padding: 10px 16px;
        }

        .tresc
        {
            padding: 12px 16px;   
        }

        .modyfikator 
        {
            margin-left: 20px;
            font-size: 1rem;
            background: #2d4a6e;
        }

        .godzina 
        {
            background: none;
            font-size: 0.9rem;
            color: #f5d8d8;
            padding: 2px 0;
            text-align: center;
        }


    </style>
</head>
<body>

    <h1>Kitchen Display</h1>

    <div id="orders">Ładowanie..</div>


    <script>

        async function loadOrders() 
        {
            const container = document.getElementById('orders');
            
            if (container.innerHTML === 'Ładowanie..') 
                container.innerHTML = '';

            const response = await fetch('/api/orders');
            const data = await response.json();

            const grouped = {};
            data.forEach(row =>  //petla  
            {   
                //sprawdzanie czy zamowienie juz istnieje w grouped
                if (!grouped[row.id_pos_order]) 
                {
                    //jesli nie to tworzy je z pusta lista pozycji
                    grouped[row.id_pos_order] = 
                    {
                        name: row.name, //nazwa zamowienia
                        created_at: row.created_at,
                        items: [] // r
                    
                    }
                }
                if (row.item_name) 
                {
                    grouped[row.id_pos_order].items.push
                    ({
                        name: row.item_name,
                        parent: row.id_pos_order_line_parent,  // null = główne danie, liczba = modyfikator
                        id: row.id_pos_order_line //id linii
                    });
                } 
            });

            // usun karty ktorych juz nie ma
            Array.from(container.children).forEach(karta => {
                if (!grouped[karta.dataset.id]) karta.remove();
            });

            // dla kazdego zamowienia stworz kartę lub zaktualizuj
            Object.entries(grouped).forEach(([id, order]) => {
                let div = container.querySelector(`[data-id="${id}"]`);
                
                if (!div) {
                    // nowa karta
                    div = document.createElement('div');
                    div.className = 'karta';
                    div.dataset.id = id;
                    container.appendChild(div);
                }

                // zawsze aktualizuj zawartosc
                const orderId = Number(id);
                div.innerHTML = `
                    <div class="naglowek" onclick="gotowe(${orderId})" style="cursor:pointer;">
                        <h2>Zamówienie #${id}</h2>
                    </div>
                    <p class="godzina">${new Date(order.created_at).toLocaleTimeString('pl-PL')}</p>
                    <div class="tresc">
                        <p class="stol">Stół: ${order.name}</p>
                        ${order.items.map(item => `<p onclick="gotoweLinia(${item.id})" style="cursor:pointer;">${item.name}</p>`).join('')}
                    </div>
                `;
            });
        }

        async function gotowe(id) 
        {
            const karta = document.querySelector(`[data-id="${id}"]`);

            if(karta)
            {
                karta.classList.add('znika');
                setTimeout(async() => {
                    await fetch(`/api/done/${id}`, { method: 'POST' });  
                
                    loadOrders();   
                },400)
            }

        }

        async function gotoweLinia(id,orderId) 
        {
            await fetch(`/api/done/line/${id}`, { method: 'POST' }); 

            const remaining = document.querySelectorAll(`[data-id="${orderId}"] .tresc p:not(.stol)`);

            if(remaining.length <= 1)
            {
                const karta = document.querySelector(`[data-id="${orderId}"]`);
                
                if (karta) 
                {
                    karta.classList.add('znika');
                    setTimeout(() => loadOrders(), 400);
                    return;
                }
            }
                
            loadOrders();
        }

        setInterval(loadOrders, 5000);
        loadOrders();
    </script>

</body>
</html>
