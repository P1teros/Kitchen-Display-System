<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Alata&family=Radio+Canada:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <style>

        /*animacje - najezdzania na przycisk i pojawiania sie nowego zamowienia*/
        p:hover 
        {
            filter: brightness(1.3);
            transition: filter 0.3s;
        }

        .naglowek:hover 
        {
            filter: brightness(1.2);
            transition: filter 0.3s;
        }

        @keyframes slide-in 
        {
            from 
            {
                opacity: 0;
                transform: translateX(-20px);
            }

            to 
            {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /*body calosci*/
        body 
        {
            background: #111;  
            color: #fff;
            font-family: 'Alata', sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        /*zamowienia*/
        #orders 
        {
            display: flex;      /* ustawianie elementow w rzedzie i przechodzenie do nowej lini */
            flex-wrap: wrap; 
            gap: 20px;      
            height: calc(100vh - 100px);  /* cały ekran minus nagłówek */    
            overflow: hidden;
        }

        #orders div 
        {
            min-width: 200px;
            max-width: 300px;
            flex: 1;  /* wypelnianie rowno dostepnych miejsc */
        }

        h2 /* styl dla zamowienia */ 
        {
            font-size: 1.1rem;  
            background: #43505e;  
            border-radius: 8px;    
            padding: 6px 12px;  
            margin: 4px 0;         
        }

        p  /* styl dla pozycji */
        {
            font-size: 1.3rem;  
            background: #476c94;   
            border-radius: 8px;   
            padding: 6px 12px; 
            margin: 4px 0;         /* odstep miedzy pozycjami */
        }

        .stol
        {
            background: #112d43;
            font-size: 1rem;       
        }

        .zamowienie
        {
            background-color: rgb(96, 96, 167); 
            font-size: 1rem;            
        }

        .karta 
        {
            background: #222;
            border: 2px solid #007afc;
            border-radius: 16px;
            overflow: hidden;    
            padding: 0; 
            animation: slide-in 0.3s ease; 
        }

        .naglowek 
        {
            background: #007afc;   
            padding: 10px 16px;
        }

        .tresc
        {
            padding: 12px 16px;   
        }

        .modyfikator 
        {
            margin-left: 20px;
            font-size: 1rem;
            background: #2d4a6e;
        }

        .godzina 
        {
            background: none;
            font-size: 0.9rem;
            color: #f5d8d8;
            padding: 2px 0;
            text-align: center;
        }


    </style>
</head>
